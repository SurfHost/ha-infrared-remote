<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0B0B1A"/>
      <stop offset="100%" stop-color="#1B1B3A"/>
    </linearGradient>
    <linearGradient id="remote" x1="90" y1="40" x2="166" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2D3A5C"/>
      <stop offset="100%" stop-color="#1A1F36"/>
    </linearGradient>
    <linearGradient id="ir2" x1="60" y1="40" x2="196" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00D2FF"/>
      <stop offset="100%" stop-color="#3A7BD5"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="256" height="256" rx="48" fill="url(#bg2)"/>
  <!-- Remote body -->
  <rect x="90" y="56" width="76" height="164" rx="20" fill="url(#remote)" stroke="#3A7BD5" stroke-width="2"/>
  <!-- Power button (top, round, red) -->
  <circle cx="128" cy="88" r="14" fill="#1A1F36" stroke="#E94560" stroke-width="2"/>
  <path d="M 128 80 L 128 88" stroke="#E94560" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 122 83 Q 128 78 134 83" stroke="#E94560" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- D-pad / navigation circle -->
  <circle cx="128" cy="136" r="22" fill="#141A2E" stroke="#3A7BD5" stroke-width="1.5"/>
  <circle cx="128" cy="136" r="7" fill="#3A7BD5" opacity="0.6"/>
  <!-- D-pad arrows -->
  <path d="M 128 118 L 132 124 L 124 124 Z" fill="#3A7BD5" opacity="0.8"/>
  <path d="M 128 154 L 132 148 L 124 148 Z" fill="#3A7BD5" opacity="0.8"/>
  <path d="M 110 136 L 116 132 L 116 140 Z" fill="#3A7BD5" opacity="0.8"/>
  <path d="M 146 136 L 140 132 L 140 140 Z" fill="#3A7BD5" opacity="0.8"/>
  <!-- Volume/channel buttons -->
  <rect x="100" y="170" width="24" height="14" rx="4" fill="#141A2E" stroke="#3A7BD5" stroke-width="1" opacity="0.7"/>
  <rect x="132" y="170" width="24" height="14" rx="4" fill="#141A2E" stroke="#3A7BD5" stroke-width="1" opacity="0.7"/>
  <text x="112" y="181" font-family="sans-serif" font-size="10" fill="#3A7BD5" text-anchor="middle" opacity="0.8">V</text>
  <text x="144" y="181" font-family="sans-serif" font-size="10" fill="#3A7BD5" text-anchor="middle" opacity="0.8">CH</text>
  <!-- Bottom buttons row -->
  <rect x="100" y="192" width="24" height="14" rx="4" fill="#141A2E" stroke="#3A7BD5" stroke-width="1" opacity="0.5"/>
  <rect x="132" y="192" width="24" height="14" rx="4" fill="#141A2E" stroke="#3A7BD5" stroke-width="1" opacity="0.5"/>
  <!-- IR signal waves from top of remote -->
  <path d="M 118 52 Q 128 34 138 52" stroke="url(#ir2)" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.9"/>
  <path d="M 110 44 Q 128 22 146 44" stroke="url(#ir2)" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.6"/>
  <path d="M 102 36 Q 128 10 154 36" stroke="url(#ir2)" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.35"/>
</svg>
